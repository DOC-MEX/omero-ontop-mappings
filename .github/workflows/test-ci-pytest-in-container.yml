name: TEST CI container ---> Ontop + pytest

on:
  workflow_dispatch:
  push:
    paths:
      - "Dockerfile.ci"
      - "omero-ontop-mappings/**"
      - "test/**"
      - "utils/**"
      - ".github/workflows/test-ci-pytest-in-container.yml"

jobs:
  test_pytest_in_container:
    runs-on: [self-hosted, Linux, X64, omero]

    env:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: postgres
      PGUSER: ontop
      PGPASSWORD: "!ontop$"
      OMERO_DB: postgres
      ONTOP_PROPERTIES_FILE: omero-test-infra.ci.properties
      RUN_HCS_IN_CI: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Build CI container
        run: |
          set -euo pipefail
          docker build --pull -f Dockerfile.ci -t omero-ci-test .

      - name: Show runner info
        run: |
          set -euo pipefail
          whoami
          pwd
          docker --version
          docker compose version || true

      # ----------------------------------------------------------
      # Fetch OMERO test infrastructure
      # ----------------------------------------------------------
      - name: Checkout omero-test-infra
        run: |
          set -euo pipefail
          rm -rf .omero
          git clone --depth 1 https://github.com/ome/omero-test-infra .omero

      - name: Create compose override
        run: |
          set -euo pipefail

          cat > .omero/docker-compose.override.yml <<'YAML'
          services:
            omero:
              volumes:
                - ..:/repo:ro
          YAML

          echo "Override file:"
          cat .omero/docker-compose.override.yml

      # ----------------------------------------------------------
      # Start OMERO stack
      # ----------------------------------------------------------
      - name: Start OMERO stack
        run: |
          set -euo pipefail
          cd .omero
          docker compose -p ci-omero up -d

      - name: Wait for Postgres
        run: |
          set -euo pipefail
          cd .omero

          for i in $(seq 1 120); do
            if docker compose -p ci-omero exec -T db pg_isready -U postgres -d postgres >/dev/null 2>&1; then
              echo "Postgres ready"
              exit 0
            fi
            echo "Waiting for Postgres ($i/120)"
            sleep 2
          done

          echo "Postgres did not start"
          docker compose -p ci-omero logs db
          exit 1

      - name: Create ontop role
        run: |
          set -euo pipefail
          cd .omero

          for i in $(seq 1 60); do
            echo "Trying to create ontop role ($i/60) ..."
            if docker compose -p ci-omero exec -T db \
              psql -U postgres -d postgres -c \
              "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'ontop') THEN CREATE ROLE ontop LOGIN PASSWORD '!ontop$'; END IF; END \$\$;" \
              >/dev/null 2>&1; then
              echo "Ontop role is ready."
              docker compose -p ci-omero exec -T db psql -U postgres -d postgres -c "\du ontop" || true
              exit 0
            fi
            sleep 2
          done

          echo "Failed to create ontop role."
          docker compose -p ci-omero logs --no-color --tail=200 db || true
          exit 1

      - name: Wait for OMERO schema
        run: |
          set -euo pipefail
          cd .omero

          for i in $(seq 1 300); do
            if docker compose -p ci-omero exec -T db \
              psql -U postgres -d "${OMERO_DB}" -tAc "SELECT to_regclass('public.dbpatch');" \
              | grep -q dbpatch; then
              echo "OMERO schema ready"
              exit 0
            fi

            echo "Waiting for OMERO schema ($i/300)"
            docker compose -p ci-omero logs --no-color --tail=60 omero || true
            sleep 5
          done

          echo "OMERO schema not detected"
          docker compose -p ci-omero logs --no-color --tail=400 omero || true
          docker compose -p ci-omero logs --no-color --tail=250 db || true
          exit 1

      - name: Grant DB permissions
        run: |
          set -euo pipefail
          cd .omero

          docker compose -p ci-omero exec -T db \
            psql -U postgres -d postgres -c \
            "GRANT CONNECT ON DATABASE ${OMERO_DB} TO ontop;"

          docker compose -p ci-omero exec -T db \
            psql -U postgres -d "${OMERO_DB}" -c \
            "GRANT USAGE ON SCHEMA public TO ontop;"

          docker compose -p ci-omero exec -T db \
            psql -U postgres -d "${OMERO_DB}" -c \
            "GRANT SELECT ON ALL TABLES IN SCHEMA public TO ontop;"

          docker compose -p ci-omero exec -T db \
            psql -U postgres -d "${OMERO_DB}" -c \
            "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO ontop;"

      - name: Generate Ontop properties
        run: |
          set -euo pipefail

          envsubst < omero-ontop-mappings/omero-test-infra.properties.template \
            > omero-ontop-mappings/${ONTOP_PROPERTIES_FILE}

          echo "Generated properties:"
          sed 's/^jdbc.password=.*/jdbc.password=***hidden***/' \
            omero-ontop-mappings/${ONTOP_PROPERTIES_FILE}

      - name: Install Ontop inside CI container
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e PYTHONDONTWRITEBYTECODE=1 \
            --network ci-omero_default \
            -v "${PWD}:/workspace" \
            -w /workspace \
            omero-ci-test \
            bash -lc '
              set -euo pipefail
              chmod +x utils/install_ontop.sh
              utils/install_ontop.sh
              ls -la ontop-cli
            '

      - name: Run Ontop materialization in container
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e PYTHONDONTWRITEBYTECODE=1 \
            --network ci-omero_default \
            -e ONTOP_PROPERTIES_FILE=${ONTOP_PROPERTIES_FILE} \
            -v "${PWD}:/workspace" \
            -w /workspace/omero-ontop-mappings \
            omero-ci-test \
            bash -lc '
              ../ontop-cli/ontop materialize \
                --mapping=omero-ontop-mappings.obda \
                --ontology=omero-ontop-mappings.ttl \
                --properties=${ONTOP_PROPERTIES_FILE} \
                --output /workspace/test/omero-test-infra
            '

      - name: Verify RDF file
        run: |
          set -euo pipefail
          ls -lh test/omero-test-infra.rdf
          test -s test/omero-test-infra.rdf

      - name: Run pytest inside CI container
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e PYTHONDONTWRITEBYTECODE=1 \
            --network ci-omero_default \
            -e RUN_HCS_IN_CI=${RUN_HCS_IN_CI} \
            -e ONTOP_PROPERTIES_FILE=${ONTOP_PROPERTIES_FILE} \
            -v "${PWD}:/workspace" \
            -w /workspace \
            omero-ci-test \
            bash -lc '
              python -m pytest -q
            '

      - name: Cleanup
        if: always()
        run: |
          set -euo pipefail
          if [ -d .omero ]; then
            cd .omero
            docker compose -p ci-omero ps || true
            docker compose -p ci-omero logs --no-color --tail=300 omero || true
            docker compose -p ci-omero logs --no-color --tail=200 db || true
            docker compose -p ci-omero down -v || true
          fi